version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "03:00"
    open-pull-requests-limit: 5
    reviewers:
      - "thatobabusi"
    labels:
      - "workflows"
    commit-message:
      prefix: "chore"
      include: "scope"
