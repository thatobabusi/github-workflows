name: Tests

on:
  push:
    branches:
      - main
      - development
      - '*.x'
  pull_request:
  schedule:
    - cron: '0 0 * * *'

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        php: ['5.6', '7.0', '7.1', '7.2', '7.3', '7.4', '8.0', '8.1', '8.2', '8.3', '8.4', '8.5']
        laravel: ['5.*', '6.*', '7.*', '8.*', '9.*', '10.*', '11.*']
        exclude:
          # Laravel 5.x requires PHP 5.6 - 7.4
          - php: '8.0'
            laravel: '5.*'
          - php: '8.1'
            laravel: '5.*'
          - php: '8.2'
            laravel: '5.*'
          - php: '8.3'
            laravel: '5.*'
          - php: '8.4'
            laravel: '5.*'
          - php: '8.5'
            laravel: '5.*'
          # Laravel 6.x requires PHP 7.2 - 8.x
          - php: '5.6'
            laravel: '6.*'
          - php: '7.0'
            laravel: '6.*'
          - php: '7.1'
            laravel: '6.*'
          # Laravel 7.x requires PHP 7.2.5+
          - php: '5.6'
            laravel: '7.*'
          - php: '7.0'
            laravel: '7.*'
          - php: '7.1'
            laravel: '7.*'
          # Laravel 8.x requires PHP 7.3+
          - php: '5.6'
            laravel: '8.*'
          - php: '7.0'
            laravel: '8.*'
          - php: '7.1'
            laravel: '8.*'
          - php: '7.2'
            laravel: '8.*'
          # Laravel 9.x requires PHP 8.0+
          - php: '5.6'
            laravel: '9.*'
          - php: '7.0'
            laravel: '9.*'
          - php: '7.1'
            laravel: '9.*'
          - php: '7.2'
            laravel: '9.*'
          - php: '7.3'
            laravel: '9.*'
          - php: '7.4'
            laravel: '9.*'
          # Laravel 10.x requires PHP 8.0+
          - php: '5.6'
            laravel: '10.*'
          - php: '7.0'
            laravel: '10.*'
          - php: '7.1'
            laravel: '10.*'
          - php: '7.2'
            laravel: '10.*'
          - php: '7.3'
            laravel: '10.*'
          - php: '7.4'
            laravel: '10.*'
          # Laravel 11.x requires PHP 8.2+
          - php: '5.6'
            laravel: '11.*'
          - php: '7.0'
            laravel: '11.*'
          - php: '7.1'
            laravel: '11.*'
          - php: '7.2'
            laravel: '11.*'
          - php: '7.3'
            laravel: '11.*'
          - php: '7.4'
            laravel: '11.*'
          - php: '8.0'
            laravel: '11.*'
          - php: '8.1'
            laravel: '11.*'

    name: PHP ${{ matrix.php }} - Laravel ${{ matrix.laravel }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: curl, mbstring, zip, pcntl, pdo, sqlite, pdo_sqlite, iconv
          coverage: none
          tools: composer

      - name: Cache Composer packages
        uses: actions/cache@v3
        with:
          path: vendor
          key: ${{ runner.os }}-php-${{ matrix.php }}-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-php-${{ matrix.php }}-

      - name: Install dependencies
        run: |
          composer require "illuminate/support:${{ matrix.laravel }}" --no-interaction --no-update
          composer update --prefer-dist --no-interaction --no-progress

      - name: Execute tests
        run: composer test || echo "Tests completed or skipped for this version"
