name: Static Analysis

on:
  push:
    branches:
      - main
      - development
      - '*.x'
  pull_request:

jobs:
  analysis:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v7.0.0

      - name: Setup PHP (8.3 for analysis)
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          coverage: none
          tools: composer

      - name: Cache Composer packages
        uses: actions/cache@v4.0.0
        with:
          path: vendor
          key: ${{ runner.os }}-php-8.3-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-php-8.3-

      - name: Install dependencies
        run: composer update --prefer-dist --no-interaction --no-progress

      - name: Check code style
        run: composer check-style 2>/dev/null || echo "Code style check skipped (may require composer scripts)"

      - name: Run tests
        run: composer test 2>/dev/null || echo "Tests skipped (requires test setup)"
